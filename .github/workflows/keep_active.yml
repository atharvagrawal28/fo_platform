# .github/workflows/keep_active.yml
# Keeps scheduled workflows from being disabled after long repository inactivity.

name: Keep Scheduled Workflows Active

on:
  schedule:
    # 8:47 AM IST on the 1st of every month (3:17 AM UTC)
    - cron: '17 3 1 * *'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keep-scheduled-workflows-active
  cancel-in-progress: false

jobs:
  keep-active:
    name: Create monthly empty activity commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create empty commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows active [skip ci]"
          git push
