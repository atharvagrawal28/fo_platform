# .github/workflows/pipeline.yml
# Runs ingestion from GitHub-hosted runners so local residential IP blocking
# does not affect the production database.

name: Earnings Pipeline

on:
  schedule:
    # 8:00 AM IST every weekday (2:30 AM UTC)
    - cron: '30 2 * * 1-5'
    # 4:30 PM IST every weekday (11:00 AM UTC)
    - cron: '0 11 * * 1-5'
    # Weekends: once at 8:00 AM IST
    - cron: '30 2 * * 0,6'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: earnings-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Bootstrap DB and ingest earnings data
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Bootstrap database and run ingestion pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/run.py
